name: Android CI

on: pull_request

jobs:
  build:

    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 21
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: 21
    - name: Build with Gradle
      run: ./gradlew assembleDebug
    - name: Build iOS shared code
      run: ./gradlew :shared:compileKotlinIosArm64


